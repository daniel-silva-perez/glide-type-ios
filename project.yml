name: GlideTypeAI
options:
  bundleIdPrefix: com.danielsilva
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
packages:
  GlideCore:
    path: .
settings:
  base:
    SWIFT_VERSION: 5.9
    IPHONEOS_DEPLOYMENT_TARGET: 17.0
targets:
  GlideTypeAI:
    type: application
    platform: iOS
    sources:
      - path: App
    dependencies:
      - target: GlideTypeAIKeyboard
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.danielsilva.GlideTypeAI
        INFOPLIST_FILE: App/Info.plist
        CODE_SIGN_STYLE: Automatic
        TARGETED_DEVICE_FAMILY: "1,2"
  GlideTypeAIKeyboard:
    type: app-extension
    platform: iOS
    sources:
      - path: KeyboardExtension
    dependencies:
      - package: GlideCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.danielsilva.GlideTypeAI.keyboard
        INFOPLIST_FILE: KeyboardExtension/Info.plist
        CODE_SIGN_STYLE: Automatic
        APPLICATION_EXTENSION_API_ONLY: YES
        SKIP_INSTALL: YES
